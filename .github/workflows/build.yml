# A workflow to trigger TE build on GitHub
name: 'Build'
on:
  pull_request:
  workflow_dispatch:
jobs:
  core:
    name: 'Core'
    runs-on: ubuntu-latest
    container:
      image: nvcr.io/nvidia/cuda:12.1.0-devel-ubuntu22.04
      options: --user root
    steps:
      - name: 'Dependencies'
        run: |
          apt-get update
          apt-get install -y git python3.9 pip cudnn9-cuda-12
          pip install cmake==3.21.0 pybind11[global] ninja
      - name: 'Checkout'
        uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: ccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad
      - name: 'Build'
        run: NVTE_USE_CCACHE=1 NVTE_CCACHE_BIN=sccache pip install --no-build-isolation . -v
        env:
          NVTE_FRAMEWORK: none
          MAX_JOBS: 1
          SCCACHE_GHA_ENABLED: "true"
      - name: 'Sanity check'
        run: python3 -c "import transformer_engine"
        working-directory: /
  pytorch:
    name: 'PyTorch'
    runs-on: ubuntu-latest
    container:
      image: nvcr.io/nvidia/cuda:12.8.0-devel-ubuntu22.04
      options: --user root
    steps:
      - name: 'Dependencies'
        run: |
          df -h
          apt-get update
          df -h
          apt-get install -y git python3.9 pip cudnn9-cuda-12
          df -h
          apt-get clean
          df -h
          pip install -v cmake
          df -h
          pip install -v ninja
          df -h
          pip install -v pydantic importlib-metadata>=1.0
          df -h
          pip install -v packaging pybind11
          df -h
          pip install -v numpy
          df -h
          pip install -v einops onnxscript
          df -h
          pip install -v torch --no-deps
          df -h
      - name: 'Checkout'
        uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: ccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad
      - name: 'Build'
        run: NVTE_USE_CCACHE=1 NVTE_CCACHE_BIN=sccache pip install --no-build-isolation . -v --no-deps
        env:
          NVTE_FRAMEWORK: pytorch
          MAX_JOBS: 1
          SCCACHE_GHA_ENABLED: "true"
      - name: 'Sanity check'
        run: python3 tests/pytorch/test_sanity_import.py
  jax:
    name: 'JAX'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nvidia/jax:jax
      options: --user root
    steps:
      - name: 'Dependencies'
        run: pip install pybind11[global]
      - name: 'Checkout'
        uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: ccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad
      - name: 'Build'
        run: |
          NVTE_CCACHE_BIN=sccache NVTE_USE_CCACHE=1 pip install --no-build-isolation . -v
        env:
          NVTE_FRAMEWORK: jax
          MAX_JOBS: 1
          SCCACHE_GHA_ENABLED: "true"
      - name: 'Sanity check'
        run: python3 tests/jax/test_sanity_import.py
  all:
    name: 'All'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nvidia/jax:jax
      options: --user root
    steps:
      - name: 'Dependencies'
        run: |
          pip install pybind11[global] einops onnxscript
          pip install torch --no-cache-dir --index-url https://download.pytorch.org/whl/cu130
      - name: 'Checkout'
        uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: ccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad
      - name: 'Build'
        run: NVTE_USE_CCACHE=1 NVTE_CCACHE_BIN=sccache pip install --no-cache-dir --no-build-isolation . -v --no-deps
        env:
          NVTE_FRAMEWORK: all
          MAX_JOBS: 1
          SCCACHE_GHA_ENABLED: "true"
      - name: 'Sanity check'
        run: python3 tests/pytorch/test_sanity_import.py && python3 tests/jax/test_sanity_import.py
