<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
      .box-label { font-size: 13px; fill: #ffffff; font-weight: bold; }
      .box-detail { font-size: 11px; fill: #e0e8f0; }
      .note { font-size: 12px; fill: #555555; font-style: italic; }
      .edge-label { font-size: 11px; fill: #444444; }
      .arrow { stroke: #5a5a5a; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .dashed-arrow { stroke: #b05030; stroke-width: 1.5; fill: none; stroke-dasharray: 6,3; marker-end: url(#arrowheadRed); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a5a5a"/>
    </marker>
    <marker id="arrowheadRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#b05030"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a" font-family="Arial, Helvetica, sans-serif">FP8 Forward Data Flow</text>

  <!-- ===== Box 1: Input ===== -->
  <rect x="30" y="120" width="130" height="60" rx="8" ry="8" fill="#4a7ab5" stroke="#3a6a9f" stroke-width="1.5"/>
  <text x="95" y="147" text-anchor="middle" class="box-label">Input</text>
  <text x="95" y="164" text-anchor="middle" class="box-detail">(BF16 / FP16)</text>

  <!-- Arrow 1→2 -->
  <line x1="160" y1="150" x2="195" y2="150" class="arrow"/>

  <!-- ===== Box 2: Quantize ===== -->
  <rect x="198" y="120" width="150" height="60" rx="8" ry="8" fill="#3d6ea5" stroke="#2d5e8f" stroke-width="1.5"/>
  <text x="273" y="147" text-anchor="middle" class="box-label">Quantize</text>
  <text x="273" y="164" text-anchor="middle" class="box-detail">(cast kernel)</text>

  <!-- Arrow 2→3 with label -->
  <line x1="348" y1="150" x2="415" y2="150" class="arrow"/>
  <text x="382" y="140" text-anchor="middle" class="edge-label">FP8 data</text>
  <text x="382" y="153" text-anchor="middle" class="edge-label">+ scale</text>

  <!-- ===== Box 3: GEMM ===== -->
  <rect x="418" y="120" width="150" height="60" rx="8" ry="8" fill="#2c5f8a" stroke="#1c4f7a" stroke-width="1.5"/>
  <text x="493" y="147" text-anchor="middle" class="box-label">GEMM</text>
  <text x="493" y="164" text-anchor="middle" class="box-detail">(cuBLASLt)</text>

  <!-- Arrow 3→4 -->
  <line x1="568" y1="150" x2="618" y2="150" class="arrow"/>

  <!-- ===== Box 4: Output ===== -->
  <rect x="621" y="120" width="140" height="60" rx="8" ry="8" fill="#4a7ab5" stroke="#3a6a9f" stroke-width="1.5"/>
  <text x="691" y="147" text-anchor="middle" class="box-label">Output</text>
  <text x="691" y="164" text-anchor="middle" class="box-detail">(BF16 / FP16)</text>

  <!-- ===== Weight box (above GEMM) ===== -->
  <rect x="430" y="35" width="130" height="55" rx="8" ry="8" fill="#5e8ec4" stroke="#4a7ab5" stroke-width="1.5"/>
  <text x="495" y="58" text-anchor="middle" class="box-label">Weight</text>
  <text x="495" y="75" text-anchor="middle" class="box-detail">(FP8 + scale)</text>

  <!-- Arrow Weight→GEMM -->
  <line x1="495" y1="90" x2="495" y2="117" class="arrow"/>

  <!-- ===== Dashed feedback arrow: GEMM → Quantize (amax history) ===== -->
  <path d="M 450 180 L 450 230 L 273 230 L 273 183" class="dashed-arrow"/>
  <text x="362" y="248" text-anchor="middle" font-size="11" fill="#b05030" font-family="Arial, Helvetica, sans-serif">amax history (delayed scaling)</text>

  <!-- ===== Note below ===== -->
  <rect x="170" y="290" width="440" height="36" rx="6" ry="6" fill="#f5f5f5" stroke="#cccccc" stroke-width="1"/>
  <text x="390" y="313" text-anchor="middle" class="note">Scale computation depends on NVTEScalingMode</text>
</svg>