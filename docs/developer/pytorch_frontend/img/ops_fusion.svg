<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #333; }
      .heading { font-size: 15px; font-weight: bold; fill: #444; }
      .label { font-size: 13px; font-weight: bold; }
      .kernel { font-size: 10px; fill: #b33; font-style: italic; }
      .arrow-label { font-size: 13px; font-weight: bold; fill: #4a90d9; }
    </style>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L4,7 L7,1" fill="none" stroke="#888" stroke-width="1.2"/>
    </marker>
    <marker id="arrowRight" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#4a90d9" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="720" height="340" fill="white"/>

  <!-- ===== LEFT SIDE: Before Fusion ===== -->
  <text x="140" y="35" text-anchor="middle" class="heading">Before Fusion</text>

  <!-- LayerNorm box -->
  <rect x="60" y="55" width="160" height="44" rx="7" fill="#f0f0f0" stroke="#bbb" stroke-width="1.3"/>
  <text x="140" y="82" text-anchor="middle" class="label">LayerNorm</text>
  <text x="235" y="82" class="kernel">kernel launch</text>

  <!-- Arrow down -->
  <line x1="140" y1="99" x2="140" y2="125" stroke="#888" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Quantize box -->
  <rect x="60" y="130" width="160" height="44" rx="7" fill="#f0f0f0" stroke="#bbb" stroke-width="1.3"/>
  <text x="140" y="157" text-anchor="middle" class="label">Quantize (FP8)</text>
  <text x="235" y="157" class="kernel">kernel launch</text>

  <!-- Arrow down -->
  <line x1="140" y1="174" x2="140" y2="200" stroke="#888" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Linear box -->
  <rect x="60" y="205" width="160" height="44" rx="7" fill="#f0f0f0" stroke="#bbb" stroke-width="1.3"/>
  <text x="140" y="232" text-anchor="middle" class="label">Linear (GEMM)</text>
  <text x="235" y="232" class="kernel">kernel launch</text>

  <!-- "3 kernel launches" summary -->
  <text x="140" y="278" text-anchor="middle" font-size="12" fill="#b33" font-weight="bold">3 kernel launches</text>

  <!-- ===== CENTER ARROW ===== -->
  <line x1="340" y1="155" x2="410" y2="155" stroke="#4a90d9" stroke-width="2.5" marker-end="url(#arrowRight)"/>
  <text x="375" y="143" text-anchor="middle" class="arrow-label">Op Fuser</text>

  <!-- ===== RIGHT SIDE: After Fusion ===== -->
  <text x="555" y="35" text-anchor="middle" class="heading">After Fusion</text>

  <!-- Fused box (taller, green) -->
  <rect x="445" y="100" width="220" height="110" rx="10" fill="#d5f5d0" stroke="#4a9030" stroke-width="2"/>
  <text x="555" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#2d6b1e">LayerNormLinear</text>
  <text x="555" y="170" text-anchor="middle" font-size="12" fill="#4a7a38">(fused kernel)</text>
  <text x="555" y="193" text-anchor="middle" font-size="10" fill="#b33" font-style="italic">single kernel launch</text>

  <!-- "1 kernel launch" summary -->
  <text x="555" y="248" text-anchor="middle" font-size="12" fill="#2d6b1e" font-weight="bold">1 kernel launch</text>

  <!-- Bottom legend -->
  <rect x="180" y="300" width="360" height="28" rx="6" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <text x="360" y="319" text-anchor="middle" font-size="11" fill="#666">Fusion reduces overhead from kernel launch latency and memory traffic</text>
</svg>
