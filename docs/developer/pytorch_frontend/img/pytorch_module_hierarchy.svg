<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="780" height="420" viewBox="0 0 780 420">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #333; }
      .title { font-size: 11px; fill: #666; }
      .note { font-size: 11px; fill: #557733; font-style: italic; }
      line, path { stroke: #888; stroke-width: 1.5; fill: none; }
    </style>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#888" stroke-width="1"/>
    </marker>
  </defs>

  <rect width="780" height="420" fill="white"/>

  <!-- torch.nn.Module -->
  <rect x="290" y="20" width="200" height="40" rx="8" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="390" y="45" text-anchor="middle" font-weight="bold" font-size="14">torch.nn.Module</text>

  <!-- Line from torch.nn.Module down to split point -->
  <line x1="390" y1="60" x2="390" y2="85"/>

  <!-- Horizontal split -->
  <line x1="310" y1="85" x2="580" y2="85"/>

  <!-- Left branch to TransformerEngineBaseModule -->
  <line x1="310" y1="85" x2="310" y2="110"/>

  <!-- Right branch to TransformerLayer -->
  <line x1="580" y1="85" x2="580" y2="110"/>

  <!-- TransformerEngineBaseModule -->
  <rect x="150" y="110" width="320" height="40" rx="8" fill="#4a90d9" stroke="#2c6fbb" stroke-width="1.5"/>
  <text x="310" y="135" text-anchor="middle" fill="white" font-weight="bold" font-size="14">TransformerEngineBaseModule</text>

  <!-- TransformerLayer -->
  <rect x="480" y="110" width="200" height="40" rx="8" fill="#6ab04c" stroke="#4a9030" stroke-width="1.5"/>
  <text x="580" y="135" text-anchor="middle" fill="white" font-weight="bold" font-size="14">TransformerLayer</text>

  <!-- Note for TransformerLayer -->
  <text x="580" y="170" text-anchor="middle" class="note">(composes TE modules)</text>

  <!-- Line from TransformerEngineBaseModule down -->
  <line x1="310" y1="150" x2="310" y2="190"/>

  <!-- Horizontal bar for 8 children -->
  <line x1="52" y1="190" x2="680" y2="190"/>

  <!-- 8 leaf nodes evenly spaced -->
  <!-- Positions: 52, 142, 232, 322, 412, 502, 592, 680 => centers at 52, 142, 232, 322, 412, 502, 592, 680 -->
  <!-- Let's use centers: 52, 142, 232, 322, 412, 502, 592, 680 — too tight. Use 8 cols across 680px -->
  <!-- Centers: 50, 140, 235, 330, 420, 510, 600, 690 — width ~80 each -->

  <!-- Vertical lines down to each leaf -->
  <line x1="55"  y1="190" x2="55"  y2="220"/>
  <line x1="150" y1="190" x2="150" y2="220"/>
  <line x1="245" y1="190" x2="245" y2="220"/>
  <line x1="335" y1="190" x2="335" y2="220"/>
  <line x1="420" y1="190" x2="420" y2="220"/>
  <line x1="510" y1="190" x2="510" y2="220"/>
  <line x1="610" y1="190" x2="610" y2="220"/>
  <line x1="720" y1="190" x2="720" y2="220"/>

  <!-- Leaf boxes -->
  <!-- Linear -->
  <rect x="10" y="220" width="90" height="36" rx="6" fill="#a8cff0" stroke="#5a9bd5" stroke-width="1.2"/>
  <text x="55" y="243" text-anchor="middle" font-size="12" font-weight="bold">Linear</text>

  <!-- LayerNorm -->
  <rect x="103" y="220" width="94" height="36" rx="6" fill="#a8cff0" stroke="#5a9bd5" stroke-width="1.2"/>
  <text x="150" y="243" text-anchor="middle" font-size="12" font-weight="bold">LayerNorm</text>

  <!-- RMSNorm -->
  <rect x="200" y="220" width="90" height="36" rx="6" fill="#a8cff0" stroke="#5a9bd5" stroke-width="1.2"/>
  <text x="245" y="243" text-anchor="middle" font-size="12" font-weight="bold">RMSNorm</text>

  <!-- LayerNormLinear -->
  <rect x="275" y="220" width="120" height="36" rx="6" fill="#a8cff0" stroke="#5a9bd5" stroke-width="1.2"/>
  <text x="335" y="243" text-anchor="middle" font-size="12" font-weight="bold">LayerNormLinear</text>

  <!-- LayerNormMLP -->
  <rect x="365" y="220" width="110" height="36" rx="6" fill="#a8cff0" stroke="#5a9bd5" stroke-width="1.2"/>
  <text x="420" y="243" text-anchor="middle" font-size="12" font-weight="bold">LayerNormMLP</text>

  <!-- GroupedLinear -->
  <rect x="455" y="220" width="110" height="36" rx="6" fill="#a8cff0" stroke="#5a9bd5" stroke-width="1.2"/>
  <text x="510" y="243" text-anchor="middle" font-size="12" font-weight="bold">GroupedLinear</text>

  <!-- DotProductAttention -->
  <rect x="540" y="220" width="140" height="36" rx="6" fill="#a8cff0" stroke="#5a9bd5" stroke-width="1.2"/>
  <text x="610" y="243" text-anchor="middle" font-size="12" font-weight="bold">DotProductAttention</text>

  <!-- MultiheadAttention -->
  <rect x="650" y="220" width="125" height="36" rx="6" fill="#a8cff0" stroke="#5a9bd5" stroke-width="1.2"/>
  <text x="713" y="243" text-anchor="middle" font-size="11" font-weight="bold">MultiheadAttention</text>

  <!-- Legend -->
  <rect x="20" y="310" width="16" height="16" rx="3" fill="#e0e0e0" stroke="#999" stroke-width="1"/>
  <text x="42" y="323" font-size="11" fill="#555">PyTorch base class</text>

  <rect x="20" y="335" width="16" height="16" rx="3" fill="#4a90d9" stroke="#2c6fbb" stroke-width="1"/>
  <text x="42" y="348" font-size="11" fill="#555">TE abstract base module</text>

  <rect x="20" y="360" width="16" height="16" rx="3" fill="#a8cff0" stroke="#5a9bd5" stroke-width="1"/>
  <text x="42" y="373" font-size="11" fill="#555">TE concrete modules</text>

  <rect x="20" y="385" width="16" height="16" rx="3" fill="#6ab04c" stroke="#4a9030" stroke-width="1"/>
  <text x="42" y="398" font-size="11" fill="#555">Composite module (composes TE modules)</text>
</svg>
