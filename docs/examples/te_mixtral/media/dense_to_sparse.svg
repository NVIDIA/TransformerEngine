<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1240 620" width="1240" height="620"
     font-family="Helvetica, Arial, sans-serif" font-size="12">
  <defs>
    <marker id="ar_g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
  </defs>

  <rect width="1240" height="620" fill="#ffffff"/>

  <text x="310" y="42" text-anchor="middle" font-size="20" font-weight="bold" fill="#1F4E79">Dense Transformer block</text>
  <text x="930" y="42" text-anchor="middle" font-size="20" font-weight="bold" fill="#1F4E79">Sparse MoE Transformer block</text>

  <rect x="60" y="60" width="500" height="540" fill="#FFF2CC" stroke="#D6B656" stroke-width="2"/>
  <rect x="680" y="60" width="500" height="540" fill="#D5E8D4" stroke="#82B366" stroke-width="2"/>

  <g>
    <rect x="160" y="80" width="300" height="36" fill="#ffffff" stroke="#666"/>
    <text x="310" y="103" text-anchor="middle">hidden_states  [B, T, h]</text>

    <rect x="160" y="140" width="300" height="50" fill="#DAE8FC" stroke="#6C8EBF"/>
    <text x="310" y="170" text-anchor="middle" font-weight="bold">Self-Attention</text>

    <rect x="160" y="210" width="300" height="30" fill="#E1D5E7" stroke="#9673A6"/>
    <text x="310" y="230" text-anchor="middle" font-size="11">Residual + RMSNorm</text>

    <rect x="120" y="260" width="380" height="170" fill="#FFE6CC" stroke="#D79B00"/>
    <text x="310" y="280" text-anchor="middle" font-weight="bold">MLP  (dense FFN)</text>
    <rect x="140" y="295" width="340" height="36" fill="#ffffff" stroke="#D79B00"/>
    <text x="310" y="318" text-anchor="middle" font-size="11">gate_proj, up_proj   [ffn, h]</text>
    <text x="310" y="350" text-anchor="middle" font-size="11" font-style="italic" fill="#666">SiLU(gate_proj &#183; x) * (up_proj &#183; x)</text>
    <rect x="140" y="365" width="340" height="36" fill="#ffffff" stroke="#D79B00"/>
    <text x="310" y="388" text-anchor="middle" font-size="11">down_proj   [h, ffn]</text>
    <text x="310" y="420" text-anchor="middle" font-size="10" font-style="italic" fill="#666">every token flows through one dense FFN</text>

    <rect x="160" y="450" width="300" height="30" fill="#E1D5E7" stroke="#9673A6"/>
    <text x="310" y="470" text-anchor="middle" font-size="11">Residual + RMSNorm</text>

    <rect x="160" y="500" width="300" height="36" fill="#ffffff" stroke="#666"/>
    <text x="310" y="523" text-anchor="middle">output  [B, T, h]</text>

    <path d="M 310 116 L 310 138" stroke="#444" stroke-width="1.5" fill="none" marker-end="url(#ar_g)"/>
    <path d="M 310 190 L 310 208" stroke="#444" stroke-width="1.5" fill="none" marker-end="url(#ar_g)"/>
    <path d="M 310 240 L 310 258" stroke="#444" stroke-width="1.5" fill="none" marker-end="url(#ar_g)"/>
    <path d="M 310 430 L 310 448" stroke="#444" stroke-width="1.5" fill="none" marker-end="url(#ar_g)"/>
    <path d="M 310 480 L 310 498" stroke="#444" stroke-width="1.5" fill="none" marker-end="url(#ar_g)"/>
  </g>

  <g>
    <rect x="780" y="80" width="300" height="36" fill="#ffffff" stroke="#666"/>
    <text x="930" y="103" text-anchor="middle">hidden_states  [B, T, h]</text>

    <rect x="780" y="140" width="300" height="50" fill="#DAE8FC" stroke="#6C8EBF"/>
    <text x="930" y="170" text-anchor="middle" font-weight="bold">Self-Attention</text>

    <rect x="780" y="210" width="300" height="30" fill="#E1D5E7" stroke="#9673A6"/>
    <text x="930" y="230" text-anchor="middle" font-size="11">Residual + RMSNorm</text>

    <rect x="720" y="260" width="420" height="46" fill="#F8CECC" stroke="#B85450"/>
    <text x="930" y="278" text-anchor="middle" font-weight="bold">Router  (gate)</text>
    <text x="930" y="296" text-anchor="middle" font-size="11">gate.weight [num_experts, h]  &#8594;  softmax  &#8594;  top-k = 2</text>

    <rect x="720" y="320" width="420" height="100" fill="#FFE6CC" stroke="#D79B00"/>
    <text x="930" y="340" text-anchor="middle" font-weight="bold">Sparse MoE  (8 experts in parallel, top-2 fire per token)</text>

    <g font-size="11" font-weight="bold">
      <rect x="735" y="350" width="44" height="60" fill="#ffffff" stroke="#D79B00"/><text x="757" y="385" text-anchor="middle">E0</text>
      <rect x="785" y="350" width="44" height="60" fill="#ffffff" stroke="#D79B00"/><text x="807" y="385" text-anchor="middle">E1</text>
      <rect x="835" y="350" width="44" height="60" fill="#ffffff" stroke="#D79B00"/><text x="857" y="385" text-anchor="middle">E2</text>
      <rect x="885" y="350" width="44" height="60" fill="#ffffff" stroke="#D79B00"/><text x="907" y="385" text-anchor="middle">E3</text>
      <rect x="935" y="350" width="44" height="60" fill="#ffffff" stroke="#D79B00"/><text x="957" y="385" text-anchor="middle">E4</text>
      <rect x="985" y="350" width="44" height="60" fill="#ffffff" stroke="#D79B00"/><text x="1007" y="385" text-anchor="middle">E5</text>
      <rect x="1035" y="350" width="44" height="60" fill="#ffffff" stroke="#D79B00"/><text x="1057" y="385" text-anchor="middle">E6</text>
      <rect x="1085" y="350" width="44" height="60" fill="#ffffff" stroke="#D79B00"/><text x="1107" y="385" text-anchor="middle">E7</text>
    </g>

    <rect x="780" y="440" width="300" height="30" fill="#F8CECC" stroke="#B85450"/>
    <text x="930" y="460" text-anchor="middle" font-size="11">Weighted top-k combine</text>

    <rect x="780" y="480" width="300" height="30" fill="#E1D5E7" stroke="#9673A6"/>
    <text x="930" y="500" text-anchor="middle" font-size="11">Residual + RMSNorm</text>

    <rect x="780" y="520" width="300" height="36" fill="#ffffff" stroke="#666"/>
    <text x="930" y="543" text-anchor="middle">output  [B, T, h]</text>

    <path d="M 930 116 L 930 138" stroke="#444" stroke-width="1.5" fill="none" marker-end="url(#ar_g)"/>
    <path d="M 930 190 L 930 208" stroke="#444" stroke-width="1.5" fill="none" marker-end="url(#ar_g)"/>
    <path d="M 930 240 L 930 258" stroke="#444" stroke-width="1.5" fill="none" marker-end="url(#ar_g)"/>
    <path d="M 930 306 L 930 318" stroke="#444" stroke-width="1.5" fill="none" marker-end="url(#ar_g)"/>
    <path d="M 930 420 L 930 438" stroke="#444" stroke-width="1.5" fill="none" marker-end="url(#ar_g)"/>
    <path d="M 930 470 L 930 478" stroke="#444" stroke-width="1.5" fill="none" marker-end="url(#ar_g)"/>
    <path d="M 930 510 L 930 518" stroke="#444" stroke-width="1.5" fill="none" marker-end="url(#ar_g)"/>
  </g>

  <g>
    <text x="620" y="345" text-anchor="middle" font-size="11" font-style="italic" fill="#444">dense MLP</text>
    <text x="620" y="362" text-anchor="middle" font-size="14" fill="#444">&#8594;</text>
    <text x="620" y="380" text-anchor="middle" font-size="11" font-style="italic" fill="#444">Router + 8 experts</text>
  </g>
</svg>
