    needs: [ jax-py3-base-arm64, jax-py3-devel-arm64 ]
    extends:
    - .stage_template

# Combine images from a build stage into a multi-arch image
.manifest_template:
    variables:
      FRAMEWORK: core
      IMAGE_BUILD_STAGE: base
    script:
    - !reference [.setup-docker ]
    - |
      if [[ "${IMAGE_BUILD_STAGE}" == "base" ]]; then
          export SOURCE_IMAGE_NAME_ROOT=${BASE_IMAGE_NAME_VERSIONED}
          export TARGET_MANIFEST=${BASE_IMAGE_NAME}
          export TARGET_MANIFEST_VERSIONED=${BASE_IMAGE_NAME_VERSIONED}
      elif [[ "${IMAGE_BUILD_STAGE}" == "devel" ]]; then
          export SOURCE_IMAGE_NAME_ROOT=${DEVEL_IMAGE_NAME_VERSIONED}
          export TARGET_MANIFEST=${DEVEL_IMAGE_NAME}
          export TARGET_MANIFEST_VERSIONED=${DEVEL_IMAGE_NAME_VERSIONED}
      elif [[ "${IMAGE_BUILD_STAGE}" == "qa" ]]; then
          export SOURCE_IMAGE_NAME_ROOT=${QA_IMAGE_NAME_VERSIONED}
          export TARGET_MANIFEST=${QA_IMAGE_NAME}
          export TARGET_MANIFEST_VERSIONED=${QA_IMAGE_NAME_VERSIONED}
      else
          echo "Could not make multi-arch image for build stage ${IMAGE_BUILD_STAGE}"
          exit 1
      fi
    - |
      export SOURCE_IMAGE_NAMES=""
      if [[ "${BUILD_AMD64}" != "0" ]]; then
          export SOURCE_IMAGE_NAMES="${SOURCE_IMAGE_NAME_ROOT}-amd64 ${SOURCE_IMAGE_NAMES}"
      fi
      if [[ "${BUILD_ARM64}" != "0" ]]; then
          export SOURCE_IMAGE_NAMES="${SOURCE_IMAGE_NAME_ROOT}-arm64 ${SOURCE_IMAGE_NAMES}"
      fi
    - docker rmi --no-prune ${SOURCE_IMAGE_NAMES} || true
    - |
      if [[ "${VIRTUAL}" != "1" ]]; then
          docker manifest rm ${TARGET_MANIFEST} || true
          docker manifest create "${TARGET_MANIFEST}" ${SOURCE_IMAGE_NAMES}
          docker manifest push ${TARGET_MANIFEST}
      fi
    - docker manifest rm ${TARGET_MANIFEST_VERSIONED} || true
    - docker manifest create "${TARGET_MANIFEST_VERSIONED}" ${SOURCE_IMAGE_NAMES}
    - docker manifest push ${TARGET_MANIFEST_VERSIONED}
    rules:
    - if: $CI_PIPELINE_SOURCE != "pipeline"
      when: never
