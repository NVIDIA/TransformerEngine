.stage_template : &STAGE
    environment: staging
    variables:
      GIT_STRATEGY: fetch
      GIT_SUBMODULE_STRATEGY: recursive
      GET_SOURCES_ATTEMPTS: 3
      FRAMEWORK: core
      ARCH: amd64
    dependencies: []
    script:
    - !reference [.setup-docker ]
    - bash docker-build.sh --pyver=${PYVER}
                           --mode=s --push
                           $(test -n "$FROM_IMAGE_NAME" && echo "--from-image=${FROM_IMAGE_NAME}")
                           $(test -n "$FROM_SCRIPTS_IMAGE" && echo "--devops-image=${FROM_SCRIPTS_IMAGE}")
                           $(test -n "$FRAMEWORK" && echo "--framework=${FRAMEWORK}")
                           $(test -n "$TAG_ROOT" && echo "--tag-root=${TAG_ROOT}")
                           --arch $ARCH
    rules:
    - if: $CI_PIPELINE_SOURCE != "pipeline"
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - if: $FRAMEWORK == "core" && $BUILD_CORE == "0"
      when: never
    - if: $FRAMEWORK == "pytorch" && $BUILD_PYTORCH == "0"
      when: never
    - if: $FRAMEWORK == "jax" && $BUILD_JAX == "0"
      when: never
    - if: $ARCH == "amd64" && $BUILD_AMD64 == "0"
      when: never
    - if: $ARCH == "arm64" && $BUILD_ARM64 == "0"
      when: never
    - if: $CI_COMMIT_BRANCH =~ /^test_release_v.*$/

core-py3-stage-amd64:
    stage: build stage
    variables:
      FRAMEWORK: core
      ARCH: amd64
    needs: [ core-py3-base-amd64, core-py3-devel-amd64 ]
