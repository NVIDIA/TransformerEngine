######################################################
## Variables used by the test runs
######################################################

variables:
    EXTRA_DOCKER_RUN_ARGS: "--init --ipc=host --ulimit memlock=-1 --ulimit stack=$$((1024*65536)) --label RUNNER_ID=$${RUNNER_ID}"
    DATADIR: /mnt/nvdl/datasets

    # variables that may be overridden by the pipeline vars
    API_LOGGING: 0
    VIRTUAL: 0
    JOB_START_STRING: "=== JOB START ==="
    JOB_END_STRING: "=== JOB END ==="

    # the following will be overridden by jobs of the pipeline that actually need to check out the sources
    GIT_STRATEGY: none
    GIT_SUBMODULE_STRATEGY: none

#########################################################
## Build steps.
##    DO NOT MODIFY THIS SECTION
#########################################################

stages:
    - create branch
    - build base
    - build devel
    - trigger
    - test
    - finalize

before_script:
    - export PYVER=3.8   && echo "${PYVER}"
    - export NV_DOCKER_ARGS="curl -s http://localhost:3476/docker/cli?dev=${RUNNER_GPUS//,/+}"     && echo "${NV_DOCKER_ARGS}"
    - export GH_BRANCH=${GH_BRANCH:-main}                                                          && echo "${GH_BRANCH}"
    - export RELEASE_BRANCH_NAME=${CI_COMMIT_REF_NAME%%-devel}                                     && echo "${RELEASE_BRANCH_NAME}"
    - export RELEASE_BRANCH_NAME_SLUG=$(echo "${RELEASE_BRANCH_NAME}" | sed 's/[^A-Za-z0-9._\-]/../g') && echo "${RELEASE_BRANCH_NAME_SLUG}" # only letters, numbers, period, hyphen, and dash are valid in docker tags; want to keep all valid characters, though, which CI_COMMIT_REF_SLUG doesn't do
    - export IMAGE_NAME_ROOT="${CI_REGISTRY_IMAGE}:${RELEASE_BRANCH_NAME_SLUG}${IMAGE_NAME_ROOT_ADDON}-py${PYVER%.*}"       && echo "${IMAGE_NAME_ROOT}"
    - export BASE_IMAGE_NAME="${IMAGE_NAME_ROOT}-base"                                             && echo "${BASE_IMAGE_NAME}"
    - export BASE_IMAGE_NAME_VERSIONED="${IMAGE_NAME_ROOT}.${CI_PIPELINE_ID}"                      && echo "${BASE_IMAGE_NAME_VERSIONED}"
    - export DEVEL_IMAGE_NAME="${IMAGE_NAME_ROOT}-devel"                                           && echo "${DEVEL_IMAGE_NAME}"
    - export DEVEL_IMAGE_NAME_VERSIONED="${IMAGE_NAME_ROOT}.${CI_PIPELINE_ID}-devel"               && echo "${DEVEL_IMAGE_NAME_VERSIONED}"
    - export DEVEL_IMAGE_NAME_PIPELINEID="${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID}-devel"            && echo "${DEVEL_IMAGE_NAME_PIPELINEID}"
    - export STAGE_IMAGE_NAME="${IMAGE_NAME_ROOT}-stage"                                           && echo "${STAGE_IMAGE_NAME}"
    - export QA_IMAGE_NAME="${IMAGE_NAME_ROOT}-qa"                                                 && echo "${QA_IMAGE_NAME}"
    - export DOCS_IMAGE_NAME="${IMAGE_NAME_ROOT}-docs"                                             && echo "${DOCS_IMAGE_NAME}"
    - export ORIGIN1="${CI_REPOSITORY_URL##*@}"
    - export ORIGIN_SSH=ssh://git@${ORIGIN1/\//:12051\/}                                           && echo "${ORIGIN_SSH}"
    - export ORIGIN_HTTPS=https://${ORIGIN1}                                                       && echo "${ORIGIN_HTTPS}"
    - export GITHUB_REPO="https://github.com/NVIDIA/TransformerEngine.git"                         && echo "${GITHUB_REPO}"
    - docker login -u gitlab-ci-token -p "${CI_JOB_TOKEN}" "${CI_REGISTRY}"

.create_branch_hidden: &CREATE_BRANCH
    stage: create branch
    tags:
      - vm-builder
    variables:
      GIT_STRATEGY: clone
      GIT_SUBMODULE_STRATEGY: recursive
      GET_SOURCES_ATTEMPTS: 3
      CURL_ATTEMPTS: 3
      CURL_SLEEP: 5
    script:
    - export CI_TIMESTAMP=$(date +%Y%m%d)                                                          && echo "${CI_TIMESTAMP}"
    - export REPO="${ORIGIN1/${CI_PROJECT_NAME}/${CI_JOB_NAME}}"
    - git config --global user.name "gitlab-runner"
    - git config --global user.email "gitlab-runner@${REPO%%/*}"
    - git config --global push.default simple
    - git remote -v
    - git remote remove github || true
    - git remote add github ${GITHUB_REPO}
    - git fetch github
    - export GIT_SHA=$(git show-ref --hash github/${GH_BRANCH})                                    && echo "${GIT_SHA}"
    - git rebase --abort || true
    - git am --abort || true
    - git merge --abort || true
    - git clean -f
    # sometimes HEAD is not what we think is so use explicitly CI_COMMIT_SHA
    - git reset --hard ${CI_COMMIT_SHA}
    # to avoid conflicts during rebase squash everything into one commit
    - git reset $(git commit-tree HEAD^{tree} -m "CI on branch ${GH_BRANCH}")
    - git rebase github/${GH_BRANCH}
    - BUILD_BRANCH_NAME=test
    - test ${RELEASE} && BUILD_BRANCH_NAME=build
    - test ${GH_NIGHTLY} && BUILD_BRANCH_NAME=nightly_${CI_TIMESTAMP}
    - test ${GH_WEEKLY} && BUILD_BRANCH_NAME=weekly_${CI_TIMESTAMP}
    - test ${GH_PR} && BUILD_BRANCH_NAME=pr_${GH_PR}
    - test ${GL_MR} && BUILD_BRANCH_NAME=pr_gl${GL_MR}
    - test ${GL_MR_BRANCH} && BUILD_BRANCH_NAME=pr_gl_${GL_MR_BRANCH}
    - BUILD_BRANCH_NAME=${BUILD_BRANCH_NAME}_${GH_BRANCH}
    - export BUILD_BRANCH_NAME=${BUILD_BRANCH_NAME}_${CI_PIPELINE_ID}_CI  && echo "${BUILD_BRANCH_NAME}"
    - git branch -D ${BUILD_BRANCH_NAME} || true
    - test ${GH_PR} &&
      FETCH_BRANCH=fetch_${GH_PR} &&
      git remote -v &&
      (git remote remove github || true) &&
      (git branch -D ${FETCH_BRANCH} || true) &&
      git remote add github ${GITHUB_REPO} &&
      git fetch github pull/${GH_PR}/head:${FETCH_BRANCH} &&
      export GIT_SHA=$(git rev-list $FETCH_BRANCH -n 1) &&
      echo $TEST_COMMIT_SHA &&
      git merge ${FETCH_BRANCH} -m "Merged PR ${GH_PR} into ${GH_BRANCH}, build ${CI_PIPELINE_ID}" &&
      git checkout -b ${BUILD_BRANCH_NAME} &&
      git submodule add ../../devops/dlfw-ci &&
      git commit -m "Merged PR ${GH_PR} into ${GH_BRANCH}, build ${CI_PIPELINE_ID}" &&
      git remote remove github &&
      git branch -D ${FETCH_BRANCH} &&
      git push ${ORIGIN_SSH} ${BUILD_BRANCH_NAME} --force
    - test ${GL_MR} &&
      FETCH_BRANCH=fetch_gl${GL_MR} &&
      git remote -v &&
      (git branch -D ${FETCH_BRANCH} || true) &&
      git fetch ${ORIGIN_SSH} merge-requests/${GL_MR}/head:${FETCH_BRANCH} &&
      git merge ${FETCH_BRANCH} -m "Merged MR gitlab${GL_MR} into ${GH_BRANCH}, build ${CI_PIPELINE_ID}" &&
      git checkout -b ${BUILD_BRANCH_NAME} &&
      git branch -D ${FETCH_BRANCH} &&
      git push ${ORIGIN_SSH} ${BUILD_BRANCH_NAME} --force
    - echo "test ${GH_PR} || test ${GL_MR} || test ${GL_MR_BRANCH} || git checkout -b ${BUILD_BRANCH_NAME} && git push ${ORIGIN_SSH} ${BUILD_BRANCH_NAME} --force"
    - test ${GH_PR} || test ${GL_MR} || test ${GL_MR_BRANCH} || git checkout -b ${BUILD_BRANCH_NAME} && git push ${ORIGIN_SSH} ${BUILD_BRANCH_NAME} --force
    # version is available only after checkout so provide it here only once
    - export CODE_VERSION=$(cat VERSION)                                                           && echo "${DALI_VERSION}"
    - tmp_file="${BUILD_BRANCH_NAME}_output"
    - |
      for i in `seq 1 ${CURL_ATTEMPTS}`; do
          sleep ${CURL_SLEEP}
          CURL_RESULT=$(curl --silent -o ${tmp_file} --write-out "%{http_code}" --request POST \
            --form token=${CI_JOB_TOKEN} \
            --form ref=${BUILD_BRANCH_NAME} \
            --form "variables[GH_BRANCH]=${GH_BRANCH}" \
            --form "variables[GIT_SHA]=${GIT_SHA}" \
            --form "variables[GH_PR]=${GH_PR}" \
            --form "variables[GL_MR]=${GL_MR}" \
            --form "variables[GH_NIGHTLY]=${GH_NIGHTLY}" \
            --form "variables[GH_WEEKLY]=${GH_WEEKLY}" \
            --form "variables[RELEASE]=${RELEASE}" \
            --form "variables[PUBLISH_DOCS]=${PUBLISH_DOCS}" \
            --form "variables[PUBLISH_MAIN_DOCS]=${PUBLISH_MAIN_DOCS}" \
            --form "variables[PUBLISH_RELEASE_DOCS]=${PUBLISH_RELEASE_DOCS}" \
            --form "variables[PUBLISH_WHL]=${PUBLISH_WHL}" \
            --form "variables[PUBLISH_RELEASE_WHL]=${PUBLISH_RELEASE_WHL}" \
            --form "variables[PUBLISH_DEV_WHL]=${PUBLISH_DEV_WHL}" \
            --form "variables[CI_TIMESTAMP]=${CI_TIMESTAMP}" \
            --form "variables[CODE_VERSION]=${CODE_VERSION}" \
            --form "variables[githubData]=${githubData}" \
            https://gitlab-master.nvidia.com/api/v4/projects/61603/trigger/pipeline | grep 201) || true
          echo "\n" | cat ${tmp_file} -
          rm ${tmp_file}
          test $CURL_RESULT && exit 0
      done
    - exit 1

create_branch:
    <<: *CREATE_BRANCH
    only:
    - web
    - schedules
    - triggers
    except:
    - tags
    tags:
        - vm-builder


.base_template : &BASE
    variables:
      GIT_STRATEGY: fetch
      GIT_SUBMODULE_STRATEGY: recursive
      GET_SOURCES_ATTEMPTS: 3
    script:
    - docker login -u gitlab-ci-token -p "${CI_JOB_TOKEN}" "${CI_REGISTRY}"
    - echo ${JOB_START_STRING}
    - bash docker-build.sh --pyver=${PYVER}
                           --mode=b --push
                           $(test "$VIRTUAL" -eq 1 && echo "--virtual")
                           $(test -n "$FROM_IMAGE_NAME" && echo "--from-image=${FROM_IMAGE_NAME}")
                           $(test -n "$FROM_SCRIPTS_IMAGE" && echo "--devops-image=${FROM_SCRIPTS_IMAGE}")
    - echo ${JOB_END_STRING}
    except:
    - tags
    tags:
    - builder
    only:
    - pipelines

py3-base:
    stage: build base
    <<: *BASE

.devel_template : &DEVEL
    variables:
      GIT_STRATEGY: fetch
      GIT_SUBMODULE_STRATEGY: recursive
      GET_SOURCES_ATTEMPTS: 3
    script:
    - docker login -u gitlab-ci-token -p "${CI_JOB_TOKEN}" "${CI_REGISTRY}"
    - bash docker-build.sh --pyver=${PYVER}
                           --mode=d --push
                           $(test "$VIRTUAL" -eq 1 && echo "--virtual")
                           $(test -n "$FROM_IMAGE_NAME" && echo "--from-image=${FROM_IMAGE_NAME}")
                           $(test -n "$FROM_SCRIPTS_IMAGE" && echo "--devops-image=${FROM_SCRIPTS_IMAGE}")
    except:
    - tags
    only:
    - pipelines

py3-devel:
    stage: build devel
    <<: *DEVEL

.stage_template : &STAGE
    environment: staging
    variables:
      GIT_STRATEGY: fetch
      GIT_SUBMODULE_STRATEGY: recursive
      GET_SOURCES_ATTEMPTS: 3
      SQRL_REGISTRY_URL: "sqrl.nvidia.com:443"
      TARGET_TOKEN_SQRL: "nvadmin"
      TARGET_REGISTRY_USER_SQRL: "nvadmin"
    dependencies: []
    script:
    - docker login -u gitlab-ci-token -p "${CI_JOB_TOKEN}" "${CI_REGISTRY}"
    - echo "${TARGET_TOKEN_SQRL}" | (set -x && docker login -u "${TARGET_REGISTRY_USER_SQRL}" --password-stdin "${SQRL_REGISTRY_URL}")
    - bash docker-build.sh --mode=s --push --pyver=${PYVER} $(test -n "$FROM_IMAGE_NAME" && echo "--from-image=${FROM_IMAGE_NAME}") $(test -n "$FROM_SCRIPTS_IMAGE" && echo "--devops-image=${FROM_SCRIPTS_IMAGE}")
    only:
    - /^.*-devel$/
    - /sqrl/
    - /sqrl_registry/
    except:
    - api
    - external
    - schedules
    - tags
    - triggers
    - web
    when: manual

.test_template: &TEST_TEMPLATE
    environment: "${CI_JOB_NAME}"
    variables:
      TEST_WORK_DIR: "/opt/${CI_PROJECT_NAME}/qa/${CI_JOB_NAME}/"
      TEST_SCRIPT: "./test.sh"
    script:
    - export TEST_WORK_DIR="${TEST_WORK_DIR%%--*}"
    - export CONTAINER_NAME="${CI_PROJECT_NAME}.${CI_JOB_ID}.${CI_JOB_NAME}"
    - test "${CI_JOB_NAME:0:3}" == "L3_" && export TEST_TIMEOUT=$((24*60*60)) || export TEST_TIMEOUT=$((3*60*60))
    - test "${API_LOGGING}" == "0" && export LOGGER="" || export LOGGER="cudnnLog.sh"
    - echo Test timeout set to $TEST_TIMEOUT seconds
    - cat /proc/driver/nvidia/version
    - if test -f "$CI_PROJECT_DIR/success"; then rm $CI_PROJECT_DIR/success; fi
    - docker pull "${DEVEL_IMAGE_NAME_VERSIONED}"
    - ( sleep $TEST_TIMEOUT && echo "******TIMEOUT EXPIRED******" && docker stop "${CONTAINER_NAME}") &
      set -x &&
      docker run $(eval ${NV_DOCKER_ARGS})
             --name "${CONTAINER_NAME}"
             -v $DATADIR:/data
             $(eval echo ${EXTRA_DOCKER_RUN_ARGS})
             -w ${TEST_WORK_DIR}
             ${DEVEL_IMAGE_NAME_VERSIONED}
             /bin/bash -c "nvidia-smi && echo -n 'nproc = ' && nproc && echo ${JOB_START_STRING} && exec ${LOGGER} bash -e ${TEST_SCRIPT}" || RV=$?;
      echo ${JOB_END_STRING};
      if [[ -z "$RV" ]]; then touch $CI_PROJECT_DIR/success ; fi;
      set +x;
      rm -rf logs/;
      docker cp "${CONTAINER_NAME}:/logs/" "logs/" 2>/dev/null || true;
      for LOGNAME in logs/*; do
          mv "${LOGNAME}" $(echo "${LOGNAME}" | sed "s/-.....\./-${CI_JOB_NAME}./") 2>/dev/null || true;
      done;
      if [ $(cat logs/cudnnapilog-*.txt 2>/dev/null | wc -l) -eq 0 ]; then rm -f logs/cudnnapilog-* 2>/dev/null; fi;
      gzip logs/*.txt 2>/dev/null || true;
      docker rm -f "${CONTAINER_NAME}" >/dev/null 2>&1;
      pkill -HUP sleep >/dev/null 2>&1 || true;
      exit ${RV:-0}
    artifacts:
      name: "${CI_JOB_NAME}"
      paths:
      - logs/*
      expire_in: 3 days
      when: always
    tags:
    - must_specify_runner
    except:
    - tags
    allow_failure: false
    needs: [ py3-devel ]
    only:
    - pipelines

.docs_template: &DOCS_BUILD
    stage: test
    variables:
      GIT_STRATEGY: fetch
      GIT_SUBMODULE_STRATEGY: recursive
      GET_SOURCES_ATTEMPTS: 3
    script:
    - export CONTAINER_NAME="${CI_PROJECT_NAME}.${CI_JOB_ID}.${CI_JOB_NAME}"
    - export TEST_TIMEOUT=$((20*60))
    - echo Test timeout set to $TEST_TIMEOUT seconds
    - cat /proc/driver/nvidia/version
    - if test -f "$CI_PROJECT_DIR/success"; then rm $CI_PROJECT_DIR/success; fi
    - docker pull "${DEVEL_IMAGE_NAME_VERSIONED}"
    - docker build --progress=plain
                   -t ${DOCS_IMAGE_NAME}
                   --build-arg "BASE_IMAGE_NAME=${DEVEL_IMAGE_NAME_VERSIONED}"
                   --build-arg "GIT_SHA=${CI_COMMIT_SHORT_SHA}"
                   -f Dockerfile.docs .
    - echo ${JOB_START_STRING}
    - ( sleep $TEST_TIMEOUT && echo "******TIMEOUT EXPIRED******" && docker kill "${CONTAINER_NAME}" ) &
      set -x &&
      docker run $(eval ${NV_DOCKER_ARGS})
             --name "${CONTAINER_NAME}"
             -v $DATADIR:/data:ro
             $(eval echo ${EXTRA_DOCKER_RUN_ARGS})
             $(eval echo ${DOCS_IMAGE_NAME})
             /bin/bash -ec "doxygen docs/Doxyfile && cd docs && make html" || RV=$?;
      echo ${JOB_END_STRING};
      set +x;
      pkill -HUP sleep || true;
      test ${RV} && docker rm -f ${CONTAINER_NAME} && docker rmi ${DOCS_IMAGE_NAME} && exit ${RV:-0}
    - docker cp "${CONTAINER_NAME}:/opt/transformerengine/docs/_build/html/." "html"
    - docker rm -f ${CONTAINER_NAME}
    - docker rmi ${DOCS_IMAGE_NAME}
    artifacts:
      name: "${CI_JOB_NAME}.${CI_PIPELINE_ID}"
      paths:
      - html/
      expire_in: 1 month
    tags:
    - 1GPU
    except:
    - tags
    allow_failure: false
    needs: [ py3-devel ]
    only:
    - pipelines

gather:
    stage: finalize
    script:
    - /bin/true
    artifacts:
      name: "${CI_PIPELINE_ID}"
      paths:
      - logs/*
      - wheelhouse/*
      expire_in: 1 month
      when: always
    when: manual
    except:
      refs:
        - tags
      variables:
        - $API_LOGGING == "0"

upload_logs:
  stage: finalize
  variables:
      CURL_ATTEMPTS: 3
      CURL_SLEEP: 5
  script:
    - tmp_file="${CI_PIPELINE_ID}_upload_tmp"
    - echo "Uploading logs for the commit ${GIT_SHA}"
    - |
      for i in `seq 1 ${CURL_ATTEMPTS}`; do
          sleep ${CURL_SLEEP}
          CURL_RESULT=$(curl --silent -o ${tmp_file} --write-out "%{http_code}" --request POST \
            --user ptredak:${JENKINS_TOKEN} \
            --data token="${JENKINS_CI_TOKEN}" \
            --data PIPELINE_ID="${CI_PIPELINE_ID}" \
            --data githubData="${githubData}" \
            --data COMMIT_SHA="${GIT_SHA}" \
            "https://blossom.nvidia.com/dl-fw-transformerengine-ci/job/te-ci-logs/buildWithParameters" | grep 201) || true
          echo "\n" | cat ${tmp_file} -
          rm ${tmp_file}
          test $CURL_RESULT && exit 0
      done
    - exit 1
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline" && $CI_COMMIT_BRANCH =~ /^pr_/
      when: always
  tags:
    - vm-builder

.manual_test_trigger: &MANUAL_TEST_TRIGGER
    stage: trigger
    script:
    - export SCOPE1=${CI_JOB_NAME%% tests}; export SCOPE=${SCOPE1##Run all }
    - docker pull ${CI_REGISTRY}/dl/devops/scripts:nvdl_nightly_test_scheduler
    - docker run --init --rm ${CI_REGISTRY}/dl/devops/scripts:nvdl_nightly_test_scheduler ${CI_PIPELINE_ID} ${CI_PROJECT_PATH} ${SCOPE}
    except:
    - tags
    when: manual
    only:
    - pipelines

.L0_test: &L0_TEST
    stage: test
    <<: *TEST_TEMPLATE

.L1_test: &L1_TEST
    stage: test
    <<: *TEST_TEMPLATE
    when: manual
    allow_failure: true

.L2_test: &L2_TEST
    stage: test
    <<: *TEST_TEMPLATE
    when: manual
    allow_failure: true

.L3_test: &L3_TEST
    stage: test
    <<: *TEST_TEMPLATE
    when: manual
    allow_failure: true

"Run all L1 tests":
    <<: *MANUAL_TEST_TRIGGER

"Run all L2 tests":
    <<: *MANUAL_TEST_TRIGGER

