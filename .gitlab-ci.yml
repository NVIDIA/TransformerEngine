    - if: $ARCH == "arm64" && $BUILD_ARM64 == "0"
      when: never
    - if: $RUN_L2_TESTS == "0"
      when: manual
      allow_failure: true
    - when: on_success
      allow_failure: false

.L2_test_on_cluster: &L2_TEST_ON_CLUSTER
    extends:
    - .L2_test
    - .test_on_cluster_template

.L3_test: &L3_TEST
    stage: test
    extends:
    - .test_template
    rules:
    - if: $CI_PIPELINE_SOURCE != "pipeline"
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - if: $FRAMEWORK == "core" && $BUILD_CORE == "0"
      when: never
    - if: $FRAMEWORK == "pytorch" && $BUILD_PYTORCH == "0"
      when: never
    - if: $FRAMEWORK == "jax" && $BUILD_JAX == "0"
      when: never
    - if: $ARCH == "amd64" && $BUILD_AMD64 == "0"
      when: never
    - if: $ARCH == "arm64" && $BUILD_ARM64 == "0"
      when: never
    - if: $RUN_L3_TESTS == "0"
      when: manual
      allow_failure: true
    - when: on_success
      allow_failure: false

.L3_test_on_cluster: &L3_TEST_ON_CLUSTER
    extends:
    - .L3_test
    - .test_on_cluster_template

"Run all L1 tests":
    <<: *MANUAL_TEST_TRIGGER

"Run all L2 tests":
    <<: *MANUAL_TEST_TRIGGER

"Run all L3 tests":
    <<: *MANUAL_TEST_TRIGGER

