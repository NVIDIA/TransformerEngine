.test_template: &TEST_TEMPLATE
    environment: "${CI_JOB_NAME}"
    variables:
      TEST_WORK_DIR: "/opt/${CI_PROJECT_NAME}/qa/${CI_JOB_NAME}/"
      TEST_SCRIPT: "./test.sh"
      FRAMEWORK: core
      ARCH: amd64
    script:
    - !reference [.setup-docker ]
    - export TEST_WORK_DIR="${TEST_WORK_DIR%%--*}"
    - export CONTAINER_NAME="${CI_PROJECT_NAME}.${CI_JOB_ID}.${CI_JOB_NAME}"
    - test "${CI_JOB_NAME:0:3}" == "L3_" && export TEST_TIMEOUT=$((24*60*60)) || export TEST_TIMEOUT=$((3*60*60))
    - test "${API_LOGGING}" == "0" && export LOGGER="" || export LOGGER="cudnnLog.sh"
    - echo Test timeout set to $TEST_TIMEOUT seconds
    - cat /proc/driver/nvidia/version
    - if test -f "$CI_PROJECT_DIR/success"; then rm $CI_PROJECT_DIR/success; fi
    - docker pull "${DEVEL_IMAGE_NAME_VERSIONED}-${ARCH}"
    - ( sleep $TEST_TIMEOUT && echo "******TIMEOUT EXPIRED******" && docker stop "${CONTAINER_NAME}") &
      set -x &&
      docker run $(eval ${NV_DOCKER_ARGS})
             --name "${CONTAINER_NAME}"
             -v $DATADIR:/data:ro,rslave
             $(eval echo ${EXTRA_DOCKER_RUN_ARGS})
             -w ${TEST_WORK_DIR}
             ${DEVEL_IMAGE_NAME_VERSIONED}-${ARCH}
             /bin/bash -c "nvidia-smi && echo -n 'nproc = ' && nproc && echo ${JOB_START_STRING} && exec ${LOGGER} bash -e ${TEST_SCRIPT}" || RV=$?;
      echo ${JOB_END_STRING};
      if [[ -z "$RV" ]]; then touch $CI_PROJECT_DIR/success ; fi;
      set +x;
      rm -rf logs/;
      docker cp "${CONTAINER_NAME}:/logs/" "logs/" 2>/dev/null || true;
      for LOGNAME in logs/*; do
          mv "${LOGNAME}" $(echo "${LOGNAME}" | sed "s/-.....\./-${CI_JOB_NAME}./") 2>/dev/null || true;
      done;
      if [ $(cat logs/cudnnapilog-*.txt 2>/dev/null | wc -l) -eq 0 ]; then rm -f logs/cudnnapilog-* 2>/dev/null; fi;
      gzip logs/*.txt 2>/dev/null || true;
      docker rm -f "${CONTAINER_NAME}" >/dev/null 2>&1;
      pkill -HUP sleep >/dev/null 2>&1 || true;
      exit ${RV:-0}
    artifacts:
      name: "${CI_JOB_NAME}"
      paths:
      - logs/*
      expire_in: 3 days
      when: always
    tags:
    - must_specify_runner
    needs: [ core-py3-devel-amd64 ]

.test_on_cluster_template: &TEST_ON_CLUSTER_TEMPLATE
    environment: "${CI_JOB_NAME}"
    variables:
      TEST_WORK_DIR: "/opt/${CI_PROJECT_NAME}/qa/${CI_JOB_NAME}/"
      TEST_SCRIPT: "./test.sh"
      FRAMEWORK: core
      ARCH: amd64
    script:
    - !reference [.setup-enroot ]
    - export TEST_WORK_DIR="${TEST_WORK_DIR%%--*}"
    - export CONTAINER_NAME="${CI_PROJECT_NAME}.${CI_JOB_ID}.${CI_JOB_NAME}"
    - test "${CI_JOB_NAME:0:3}" == "L3_" && export TEST_TIMEOUT=$((24*60*60)) || export TEST_TIMEOUT=$((3*60*60))
    - test "${API_LOGGING}" == "0" && export LOGGER="" || export LOGGER="cudnnLog.sh"
    - echo Test timeout set to $TEST_TIMEOUT seconds
    - if test -f "$CI_PROJECT_DIR/success"; then rm $CI_PROJECT_DIR/success; fi
    - mkdir -p ${CI_PROJECT_DIR}/${CI_JOB_ID}/logs
    - export DEVEL_IMAGE_NAME_VERSIONED="${DEVEL_IMAGE_NAME_VERSIONED/:5005/}"
    - export JOBNAME="${SLURM_ACCOUNT}:${CI_PIPELINE_ID}:${GITLAB_USER_LOGIN}:${CI_JOB_NAME}:${CI_PROJECT_PATH}:${CI_COMMIT_BRANCH}:${CI_JOB_ID}"
    - ( sleep $TEST_TIMEOUT && echo "******TIMEOUT EXPIRED******" && docker stop "${CONTAINER_NAME}") &
      set -x &&
      srun -p ${SLURM_PARTITION} -A ${SLURM_ACCOUNT} -N ${SLURM_NODES} --job-name ${JOBNAME} --mpi=pmix --export=ALL --container-image=${DEVEL_IMAGE_NAME_VERSIONED}-${ARCH} --container-name=${CONTAINER_NAME} --container-mounts=$DATADIR:/data --container-mounts=${CI_PROJECT_DIR}/${CI_JOB_ID}/logs:/logs --container-workdir=${TEST_WORK_DIR} /bin/bash -c "([ ! -x /usr/bin/nvidia-smi ] || nvidia-smi) && echo -n 'nproc = ' && nproc && echo ${JOB_START_STRING} && exec ${LOGGER} bash -ex ${TEST_SCRIPT}" || RV=$?;
      echo ${JOB_END_STRING};
      if [[ -z "$RV" ]]; then touch $CI_PROJECT_DIR/success ; fi;
      set +x;
      for LOGNAME in ${CI_PROJECT_DIR}/${CI_JOB_ID}/logs/**/*; do
          if [ ! -s "${LOGNAME}" ]; then
              rm -f "${LOGNAME}" ;
          else
              mv "${LOGNAME}" $(echo "${LOGNAME}" | sed "s/-.....\./-${CI_JOB_NAME_SLUG}./") 2>/dev/null || true;
          fi;
      done;
      gzip ${CI_PROJECT_DIR}/${CI_JOB_ID}/logs/*.txt 2>/dev/null || true;
      exit ${RV:-0}
    artifacts:
      name: "${CI_JOB_NAME}"
      paths:
      - logs/*
      expire_in: 3 days
      when: always
    tags:
    - must_specify_runner
    needs: [ core-py3-devel-amd64 ]

.docs_template: &DOCS_BUILD
    stage: test
    variables:
      GIT_STRATEGY: fetch
      GIT_SUBMODULE_STRATEGY: recursive
      GET_SOURCES_ATTEMPTS: 3
      FRAMEWORK: core
      ARCH: amd64
    script:
    - !reference [.setup-docker ]
    - export CONTAINER_NAME="${CI_PROJECT_NAME}.${CI_JOB_ID}.${CI_JOB_NAME}"
    - export TEST_TIMEOUT=$((20*60))
    - echo Test timeout set to $TEST_TIMEOUT seconds
    - cat /proc/driver/nvidia/version
    - if test -f "$CI_PROJECT_DIR/success"; then rm $CI_PROJECT_DIR/success; fi
    - docker pull "${DEVEL_IMAGE_NAME_VERSIONED}-${ARCH}"
    - docker build --progress=plain
                   -t ${DOCS_IMAGE_NAME}
                   --build-arg "BASE_IMAGE_NAME=${DEVEL_IMAGE_NAME_VERSIONED}-${ARCH}"
                   --build-arg "GIT_SHA=${GIT_SHA}"
                   -f Dockerfile.docs .
    - echo ${JOB_START_STRING}
    - ( sleep $TEST_TIMEOUT && echo "******TIMEOUT EXPIRED******" && docker kill "${CONTAINER_NAME}" ) &
      set -x &&
      docker run $(eval ${NV_DOCKER_ARGS})
             --name "${CONTAINER_NAME}"
             -v $DATADIR:/data:ro
             $(eval echo ${EXTRA_DOCKER_RUN_ARGS})
             $(eval echo ${DOCS_IMAGE_NAME})
             /bin/bash -ec "doxygen docs/Doxyfile && cd docs && make html" || RV=$?;
      echo ${JOB_END_STRING};
      set +x;
      pkill -HUP sleep || true;
      test ${RV} && docker rm -f ${CONTAINER_NAME} && docker rmi ${DOCS_IMAGE_NAME} && exit ${RV:-0}
    - docker cp "${CONTAINER_NAME}:/opt/transformerengine/docs/_build/html/." "html"
    - docker rm -f ${CONTAINER_NAME}
    - docker rmi ${DOCS_IMAGE_NAME}
    artifacts:
      name: "${CI_JOB_NAME}.${CI_PIPELINE_ID}"
      paths:
      - html/
      expire_in: 1 month
    tags:
    - 1GPU
    needs: [ core-py3-devel-amd64 ]
    rules:
    - if: $CI_PIPELINE_SOURCE != "pipeline"
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - if: $FRAMEWORK == "core" && $BUILD_CORE == "0"
      when: never
    - if: $FRAMEWORK == "pytorch" && $BUILD_PYTORCH == "0"
      when: never
    - if: $FRAMEWORK == "jax" && $BUILD_JAX == "0"
      when: never
    - if: $ARCH == "amd64" && $BUILD_AMD64 == "0"
      when: never
    - if: $ARCH == "arm64" && $BUILD_ARM64 == "0"
      when: never
    - when: on_success
      allow_failure: false

gather:
    stage: finalize
    script:
    - /bin/true
    artifacts:
      name: "${CI_PIPELINE_ID}"
      paths:
      - logs/*
      - wheelhouse/*
      expire_in: 1 month
      when: always
    rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $API_LOGGING == "0"
      when: never
    - when: manual
      allow_failure: true

upload_logs:
  stage: finalize
  variables:
      CURL_ATTEMPTS: 3
      CURL_SLEEP: 5
  script:
    - tmp_file="${CI_PIPELINE_ID}_upload_tmp"
    - echo "Uploading logs for the commit ${GIT_SHA}"
    - |
      for i in `seq 1 ${CURL_ATTEMPTS}`; do
          sleep ${CURL_SLEEP}
          CURL_RESULT=$(curl --silent -o ${tmp_file} --write-out "%{http_code}" --request POST \
            --user tmoon@nvidia.com:${JENKINS_TOKEN} \
            --data token="${JENKINS_CI_TOKEN}" \
            --data PIPELINE_ID="${CI_PIPELINE_ID}" \
            --data githubData="${githubData}" \
            --data COMMIT_SHA="${GIT_SHA}" \
            "https://prod.blsm.nvidia.com/dl-fw-transformerengine-ci/job/te-ci-logs/buildWithParameters" | grep 201) || true
          echo "\n" | cat ${tmp_file} -
          rm ${tmp_file}
          test $CURL_RESULT && exit 0
      done
    - exit 1
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline" && $CI_COMMIT_BRANCH =~ /^pr_/
      when: always
  tags:
    - vm-builder

send_result_to_slack:
  stage: finalize
  variables:
      FAIL_SLACK_EMOJI: ":red_cross:"
      PASS_SLACK_EMOJI: ":white_check_mark:"
  script:
  - |
    function get_github_username() {
        jq -r '.comment.user.login' <<< "${githubData}"
    }

    function get_github_pr_info_as_markdown() {
        if [[ -z "${githubData}" ]]; then
          echo ""
        else
          local pr_title=$(jq -r '.issue.title' <<< "${githubData}")
          local pr_url=$(jq -r '.issue.html_url' <<< "${githubData}")
          echo "<${pr_url}|PR>: ${pr_title}"
        fi
    }

    function get_nvidia_username_from_github_username() {
        local github_username="$1"
        local nv_username="INVALID"
        # Set the NVIDIA username based on the GitHub username.
        if [[ "${github_username}" == "jberchtold-nvidia" ]]; then nv_username="jberchtold@nvidia.com" ; fi
        if [[ "${github_username}" == "denera" ]]; then nv_username="adener@nvidia.com" ; fi
        if [[ "${github_username}" == "ksivaman" ]]; then nv_username="ksivamani@nvidia.com" ; fi
        if [[ "${github_username}" == "KshitijLakhani" ]]; then nv_username="klakhani@nvidia.com" ; fi
        if [[ "${github_username}" == "Oleg-Goncharov" ]]; then nv_username="ogoncharov@nvidia.com" ; fi
        if [[ "${github_username}" == "phu0ngng" ]]; then nv_username="phuonguyen@nvidia.com" ; fi
        if [[ "${github_username}" == "ptrendx" ]]; then nv_username="ptredak@nvidia.com" ; fi
        if [[ "${github_username}" == "sudhakarsingh27" ]]; then nv_username="sudhakars@nvidia.com" ; fi
        if [[ "${github_username}" == "timmoon10" ]]; then nv_username="tmoon@nvidia.com" ; fi
        if [[ "${github_username}" == "cyanguwa" ]]; then nv_username="charleney@nvidia.com" ; fi
        if [[ "${github_username}" == "pggPL" ]]; then nv_username="pgadzinski@nvidia.com" ; fi
        if [[ "${github_username}" == "mk-61" ]]; then nv_username="vcherepanov@nvidia.com" ; fi
        if [[ "${github_username}" == "negvet" ]]; then nv_username="etsykunov@nvidia.com" ; fi
        if [[ "${github_username}" == "janekb04" ]]; then nv_username="jbielak@nvidia.com" ; fi
        echo "${nv_username}"
    }

    function get_slack_user_id_from_nvidia_username() {
        local nv_username="$1"
        local slack_user_id="(Unknown nvidia user ${nv_username})"
        # Set the Slack user ID based on the NVIDIA username. To find a Slack user ID, click on a Slack profile, click on "More actions" (three dots), and select "Copy member ID".
        if [[ "${nv_username}" == "jberchtold@nvidia.com" ]]; then slack_user_id="<@U023NP29RHV>" ; fi
        if [[ "${nv_username}" == "adener@nvidia.com" ]]; then slack_user_id="<@U05NSKSK9KL>" ; fi
        if [[ "${nv_username}" == "ksivamani@nvidia.com" ]]; then slack_user_id="<@U013FFF2QRZ>" ; fi
        if [[ "${nv_username}" == "klakhani@nvidia.com" ]]; then slack_user_id="<@U081D91JGP4>" ; fi
        if [[ "${nv_username}" == "ogoncharov@nvidia.com" ]]; then slack_user_id="<@U063MCT3YEP>" ; fi
        if [[ "${nv_username}" == "phuonguyen@nvidia.com" ]]; then slack_user_id="<@U06RB69AJE8>" ; fi
        if [[ "${nv_username}" == "ptredak@nvidia.com" ]]; then slack_user_id="<@U7P8MFMLH>" ; fi
        if [[ "${nv_username}" == "sudhakars@nvidia.com" ]]; then slack_user_id="<@U013DK4P1NU>" ; fi
        if [[ "${nv_username}" == "tmoon@nvidia.com" ]]; then slack_user_id="<@U037S1HPMLP>" ; fi
        if [[ "${nv_username}" == "charleney@nvidia.com" ]]; then slack_user_id="<@U01DQ922GMA>" ; fi
        if [[ "${nv_username}" == "pgadzinski@nvidia.com" ]]; then slack_user_id="<@U06P0EX6R19>" ; fi
        if [[ "${nv_username}" == "vcherepanov@nvidia.com" ]]; then slack_user_id="<@USE6S7V4Z>" ; fi
        if [[ "${nv_username}" == "etsykunov@nvidia.com" ]]; then slack_user_id="<@U08F3RZUZA5>" ; fi
        if [[ "${nv_username}" == "jbielak@nvidia.com" ]]; then slack_user_id="<@U05AGG0044R>" ; fi
        echo "${slack_user_id}"
    }

    function jq_in_place() {
        jq "$@" > "${2}.tmp" && mv "${2}.tmp" "$2";
    }

    function get_gitlab_pipeline_jobs() {
        curl --header "PRIVATE-TOKEN: $GITLAB_JOB_QUERY_TOKEN" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/pipelines/${CI_PIPELINE_ID}/jobs?per_page=100"
    }

    # Prepare the pipeline status message to be sent to Slack.
    function get_pipeline_status_message() {
        local slack_user_id="$1"
        local RESPONSE=$(get_gitlab_pipeline_jobs)

        local FAILED_JOB_COUNT=$(echo "$RESPONSE" | jq '[.[] | select(.status != "manual") | select(.stage != "finalize") | select(.status != "success")] | length')
        if [ "$FAILED_JOB_COUNT" -gt 0 ]; then
            echo -n "$FAIL_SLACK_EMOJI [FAILED] "
        else
            echo -n "$PASS_SLACK_EMOJI [PASSED] "
        fi

        echo "CI Pipeline <https://gitlab-master.nvidia.com/dl/transformerengine/transformerengine/-/pipelines/${CI_PIPELINE_ID}|${CI_PIPELINE_ID}> completed."

        echo "Triggered by: $slack_user_id"

        echo "$(get_github_pr_info_as_markdown)"
    }

    function get_pipeline_job_summary_message() {
        local slack_user_id="$1"
        local RESPONSE=$(get_gitlab_pipeline_jobs)

        echo "Jobs Summary:"
        echo "$RESPONSE" | jq --raw-output "[.[] | select(.status != \"manual\") | select(.stage != \"finalize\") | select(.status != \"success\")] | [.[] | \"$FAIL_SLACK_EMOJI \" + .name + \" (<\" + .web_url + \"|link>)\"] | join(\"\n\")"
        echo "$RESPONSE" | jq --raw-output "[.[] | select(.status != \"manual\") | select(.stage != \"finalize\") | select(.status == \"success\")] | [.[] | \"$PASS_SLACK_EMOJI \" + .name + \" (<\" + .web_url + \"|link>)\"] | join(\"\n\")"
    }

    # Send message via Slack API.
    # Can optionally pass a parent message to 'sendSlackMessage' as the second arg to post the message as a reply in a thread.
    function sendSlackMessage() {
        local SLACK_MESSAGE_MRKDWN=${1}
        local PARENT_MESSAGE_TS=${2}
        jq '{channel: $channel, blocks: []}' -n --arg channel "#swdl-fw-transformerengine-ci" > payload.json
        # Splits the message up into blocks due to Slack's limit of 3000 characters per block.
        [ -n "${SLACK_MESSAGE_MRKDWN}" ] && jq_in_place '.blocks += ($mrkdwn | split("\n") | map(select(. != "")) | map({type: "section", text: {type: "mrkdwn", text: .}}))' payload.json --arg mrkdwn "${SLACK_MESSAGE_MRKDWN}"
        [ -n "$PARENT_MESSAGE_TS" ] && jq_in_place '. += {"thread_ts" : $ts}' payload.json --arg ts ${PARENT_MESSAGE_TS//\"/}
        curl -X POST https://slack.com/api/chat.postMessage -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" -H "Content-Type: application/json" -d @payload.json -o response.json || (echo "Curl command failed with status $?"; exit 1)
        cat response.json | jq '.' > /dev/null
        (jq -e '.ok == true' response.json > /dev/null && echo $(jq -e '.ts' response.json)) || (echo "Slack API request failed"; cat response.json; exit 1)
    }

    if [[ -z "${githubData}" ]]; then
      # GitLab username
      NV_USERNAME=${GITLAB_USER_EMAIL}
    else
      GH_USERNAME=$(get_github_username)
      echo "GitHub username: ${GH_USERNAME}"
      NV_USERNAME=$(get_nvidia_username_from_github_username "${GH_USERNAME}")
    fi
    echo "Nvidia username: ${NV_USERNAME}"
    SLACK_USER_ID=$(get_slack_user_id_from_nvidia_username "${NV_USERNAME}")
    echo "Slack user ID: ${SLACK_USER_ID}"
    thread_id=$(sendSlackMessage "$(get_pipeline_status_message ${SLACK_USER_ID})")
    # Send job status in thread
    sendSlackMessage "$(get_pipeline_job_summary_message ${SLACK_USER_ID})" "${thread_id}"
  rules:
    - if: $CI_PIPELINE_SOURCE != "pipeline"
      when: never
    - if: $SEND_SLACK_MESSAGE == "1"
      when: always
      allow_failure: true
    - when: manual
      allow_failure: true
  tags:
    - vm-builder

